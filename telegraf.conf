# telegraf.conf
[global_tags]
  environment = "production"

[agent]
  interval = "10s"
  flush_interval = "10s"
  collection_jitter = "0s"
  flush_jitter = "0s"

# Coleta métricas do Docker
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  container_names = []
  timeout = "5s"
  
  # Métricas a coletar
  perdevice = true
  total = false
  
  # Tags para identificar containers
  tag_env = ["SIMLAB", "cooja"]
  
  # Coletar métricas específicas
  docker_label_include = []
  docker_label_exclude = []

# Coleta métricas do sistema (CPU, Memória, Disco)
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]
  # Coleta métricas de memória

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]
  # Métricas de I/O de disco

[[inputs.net]]
  # Métricas de rede

[[inputs.netstat]]
  # Estatísticas de rede

[[inputs.processes]]
  # Métricas de processos

[[inputs.kernel]]
  # Métricas do kernel

# Output para InfluxDB
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-token"
  organization = "myorg"
  bucket = "docker"