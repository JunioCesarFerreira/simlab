volumes:
  mongo_data:
  mongo_config:
  prometheus-data:
  grafana-storage:

networks:
  mongo-net:
    name: mongo_net
    driver: bridge
  cooja-net:
    name: cooja_net
    driver: bridge
  proxy-net:
    name: proxy_net
    driver: bridge
  monitoring-net:
    name: monitoring_net
    driver: bridge
