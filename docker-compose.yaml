services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - 27017:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "simlab.type=database"
      - "simlab.role=storage"
      - "simlab.group=infrastructure"
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - "mongo_data:/data/db"
      - "mongo_config:/data/configdb"
    networks:
      - mongo-net

  restapi:
    build:
      context: .
      dockerfile: Dockerfile.rest-api
    container_name: rest_api
    restart: always
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/pylib
      - DB_NAME=simlab
      - SIMLAB_API_KEY=simlab-api-key42
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - IS_DOCKER=True
    ports:
      - "8000:8000"
    labels:
      - "simlab.type=api"
      - "simlab.role=orchestrator"
      - "simlab.group=backend"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo-net
      - proxy-net

  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_API_KEY: simlab-api-key42
    container_name: simlab_gui
    restart: unless-stopped
    ports:
      - "5173:80"
    labels:
      - "simlab.type=frontend"
      - "simlab.role=ui"
      - "simlab.group=frontend"
    depends_on:
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - proxy-net

  moengine:
    build:
      context: .
      dockerfile: Dockerfile.mo-engine
    container_name: mo_engine
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/pylib
      - DB_NAME=simlab
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - TEMPLATE_XML=/app/mo-engine/simulation_template.xml
      - IS_DOCKER=True
    ports:
      - "2219:22"
    labels:
      - "simlab.type=engine"
      - "simlab.role=processor"
      - "simlab.group=backend"
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo-net

  masternode:
    build:
      context: .
      dockerfile: Dockerfile.master-node
    container_name: master_node
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/pylib
      - DB_NAME=simlab
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - IS_DOCKER=True
      - NUMBER_OF_CONTAINERS=6
    ports:
      - "2220:22"
    labels:
      - "simlab.type=master"
      - "simlab.role=controller"
      - "simlab.group=backend"
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo-net
      - cooja-net


# Attention! When modifying the number of Cooja containers, 
# remember to modify the masternode's NUMBER_OF_CONTAINERS environment variable.

  cooja1:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja1
    restart: unless-stopped
    ports:
      - "2231:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=1"
      - "simlab.role=worker"
      - "simlab.group=simulation"

