services:

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - --docker=unix:///var/run/docker.sock
    ports:
      - "8080:8080"
    labels:
      - "simlab.type=collector"
      - "simlab.role=metrics"
      - "simlab.group=monitoring"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    labels:
      - "simlab.type=timeseries"
      - "simlab.role=storage"
      - "simlab.group=monitoring"
    depends_on:
      - cadvisor
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=simlab
      - GF_SECURITY_ADMIN_PASSWORD=simlab123
    restart: unless-stopped
    labels:
      - "simlab.type=visualization"
      - "simlab.role=dashboard"
      - "simlab.group=monitoring"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - prometheus
    networks:
      - monitoring-net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - 27017:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "simlab.type=database"
      - "simlab.role=storage"
      - "simlab.group=infrastructure"
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - "mongo_data:/data/db"
      - "mongo_config:/data/configdb"
    networks:
      - mongo-net

  restapi:
    build:
      context: .
      dockerfile: Dockerfile.rest-api
    container_name: rest_api
    restart: always
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/pylib
      - DB_NAME=simlab
      - SIMLAB_API_KEY=simlab-api-key42
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - IS_DOCKER=True
    ports:
      - "8000:8000"
    labels:
      - "simlab.type=api"
      - "simlab.role=orchestrator"
      - "simlab.group=backend"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo-net
      - proxy-net

  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_API_KEY: simlab-api-key42
    container_name: simlab_gui
    restart: unless-stopped
    ports:
      - "5173:80"
    labels:
      - "simlab.type=frontend"
      - "simlab.role=ui"
      - "simlab.group=frontend"
    depends_on:
      restapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - proxy-net

  moengine:
    build:
      context: .
      dockerfile: Dockerfile.mo-engine
    container_name: mo_engine
    restart: unless-stopped
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/pylib
      - DB_NAME=simlab
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - TEMPLATE_XML=/app/mo-engine/simulation_template.xml
      - IS_DOCKER=True
    ports:
      - "2219:22"
    labels:
      - "simlab.type=engine"
      - "simlab.role=processor"
      - "simlab.group=backend"
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo-net

  masternode:
    build:
      context: .
      dockerfile: Dockerfile.master-node
    container_name: master_node
    restart: unless-stopped
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/pylib
      - DB_NAME=simlab
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - IS_DOCKER=True
      - NUMBER_OF_CONTAINERS=16
      - COOJA_JVM_XMS=4g
      - COOJA_JVM_XMX=4g
    ports:
      - "2220:22"
    labels:
      - "simlab.type=master"
      - "simlab.role=controller"
      - "simlab.group=backend"
    healthcheck:
      test: ["CMD", "pgrep", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo-net
      - cooja-net


