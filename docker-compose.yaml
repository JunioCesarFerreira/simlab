# Attention! When modifying the number of Cooja containers, 
# remember to modify the masternode's NUMBER_OF_CONTAINERS environment variable.

volumes:
  mongo_data:
  mongo_config:
  influxdb-data:
  grafana-storage:

networks:
  mongo-net:
    name: mongo_net
    driver: bridge
  cooja-net:
    name: cooja_net
    driver: bridge
  proxy-net:
    name: proxy_net
    driver: bridge
