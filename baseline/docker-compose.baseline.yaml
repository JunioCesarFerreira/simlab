# Script-based baseline orchestrator (§5.6 of the SimLab paper).
#
# Launches a fixed number of Cooja worker containers in parallel, exposing
# SSH on incremental host ports.  There is intentionally NO mo-engine,
# NO master-node, NO REST API, NO MongoDB, and NO Change Streams.
#
# Inputs are pushed via scp/docker cp by run_baseline.sh; outputs are
# pulled the same way.  No state machine, no persistence, no resume.
#
# Adjust the number of cooja* services and the C_MAX env in run_baseline.sh
# to match the experiment described in §5.2 of the paper.

services:

  cooja1:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: baseline_cooja1
    restart: "no"
    ports:
      - "12231:22"
    networks: [ baseline-net ]
    labels:
      - "baseline.role=worker"
      - "baseline.id=1"

  cooja2:
