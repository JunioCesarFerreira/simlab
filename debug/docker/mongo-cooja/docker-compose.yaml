services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - 27017:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - "mongo_data:/data/db"
      - "mongo_config:/data/configdb"

  # Monitoring pair for runtime telemetry when mo-engine runs on the host:
  # Prometheus is published on localhost:9090 (the collector's local default).
  # The simlab.group labels on the cooja services are required — the telemetry
  # container filter selects group "simulation|backend".
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - --docker=unix:///var/run/docker.sock
    ports:
      - "8080:8080"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ../../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor
    networks:
      - monitoring-net

  cooja1:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja1
    restart: unless-stopped
    ports:
      - "2231:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=1"
      - "simlab.role=worker"
      - "simlab.group=simulation"

  cooja2:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja2
    restart: unless-stopped
    ports:
      - "2232:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=2"
      - "simlab.role=worker"
      - "simlab.group=simulation"

  cooja3:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja3
    restart: unless-stopped
    ports:
      - "2233:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=3"
      - "simlab.role=worker"
      - "simlab.group=simulation"

  cooja4:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja4
    restart: unless-stopped
    ports:
      - "2234:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=4"
      - "simlab.role=worker"
      - "simlab.group=simulation"

  cooja5:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja5
    restart: unless-stopped
    ports:
      - "2235:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=5"
      - "simlab.role=worker"
      - "simlab.group=simulation"

  cooja6:
    image: juniocesarferreira/simulation-cooja:v1.1
    container_name: cooja6
    restart: unless-stopped
    ports:
      - "2236:22"
    networks:
      - cooja-net
    labels:
      - "simlab.type=cooja"
      - "simlab.id=6"
      - "simlab.role=worker"
      - "simlab.group=simulation"

networks:
  cooja-net:
    driver: bridge
  monitoring-net:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  prometheus-data:
